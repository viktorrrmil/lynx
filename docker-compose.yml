version: '3.8'

services:
  port-cleanup:
    image: alpine:latest
    container_name: lynx-port-cleanup
    network_mode: host
    command: >
      sh -c "
        apk add --no-cache lsof &&
        echo 'Checking ports 5433, 5000, 8080, 5173...' &&
        for port in 5433 5000 8080 5173; do
          pids=$$(lsof -ti:\$$port 2>/dev/null || true);
          if [ -n \"\$$pids\" ]; then
            echo \"Killing processes on port \$$port: \$$pids\";
            kill -9 \$$pids 2>/dev/null || true;
          else
            echo \"Port \$$port is free\";
          fi;
        done &&
        echo 'Port cleanup complete!'
      "
    profiles:
      - cleanup
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lynx
      POSTGRES_USER: lynx
      POSTGRES_PASSWORD: lynx
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lynx -d lynx" ]
      interval: 5s
      timeout: 5s
      retries: 5
  postgres_geo:
    build: ./postgres-geo
    image: lynx-postgres-geo
    environment:
      POSTGRES_DB: lynx_geo
      POSTGRES_USER: lynx
      POSTGRES_PASSWORD: lynx
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - pgdata_geo:/var/lib/postgresql/data
      - ./init-db-geo:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lynx -d lynx_geo" ]
      interval: 5s
      timeout: 5s
      retries: 5

  embeddings:
    build: ./embeddings
    container_name: lynx-embeddings
    ports:
      - "5000:5000"
    restart: unless-stopped

  api:
    build:
      context: ./core
      dockerfile: bindings/go/Dockerfile
    container_name: lynx-api
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      embeddings:
        condition: service_started
    environment:
      - EMBEDDING_SERVICE_URL=http://embeddings:5000
    restart: unless-stopped

  frontend:
    build: ./frontend/lynx-frontend
    container_name: lynx-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/lynx-frontend:/app
      - /app/node_modules
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8080
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

volumes:
  pgdata:
  pgdata_geo:
